<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Control Center | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; --primary: #0071e3; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; height: 100vh;}

        /* Sidebar */
        .sidebar { width: 240px; background: var(--bg); border-right: 1px solid rgba(0,0,0,0.04); padding: 30px 0; display: flex; flex-direction: column;}
        .brand { padding: 0 30px; margin-bottom: 40px;}
        .brand h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em;}
        .brand span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;}

        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 30px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500;}
        .nav-item.active { background: var(--surface); color: var(--text-main); font-weight: 600; border-radius: 0 999px 999px 0; margin-right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);}
        .nav-item i { width: 20px; font-size: 16px;}
        .nav-item:hover:not(.active) { color: var(--text-main); }

        .bottom-nav { margin-top: auto; }

        /* Main Content */
        .main { flex: 1; padding: 50px 60px; overflow-y: auto; }
        .main-header h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.04em; margin: 0 0 10px 0;}
        .main-header p { color: var(--text-muted); font-size: 15px; margin: 0 0 50px 0;}

        /* Grid Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 40px;}
        .card { background: var(--surface); border-radius: 24px; padding: 30px; box-shadow: 0 4px 14px rgba(26,28,29,0.02); display: flex; flex-direction: column; text-decoration: none; color: inherit; transition: 0.3s;}
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(26,28,29,0.05);}
        .icon-box { width: 48px; height: 48px; background: var(--bg); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: var(--text-main); margin-bottom: 20px;}
        .card h3 { font-size: 20px; font-weight: 600; margin: 0 0 5px 0;}
        .card p { font-size: 13px; color: var(--text-muted); margin: 0;}
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand">
        <h2>Management</h2>
        <span>Admin Control</span>
    </div>

    <a th:href="@{/admin/dashboard}" class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</a>
    <a th:href="@{/admin/gerants}" class="nav-item"><i class="fas fa-users-cog"></i> Users</a>
    <a th:href="@{/admin/commandes}" class="nav-item"><i class="fas fa-shopping-cart"></i> Orders</a>
    <a th:href="@{/admin/avis}" class="nav-item"><i class="fas fa-comment-alt"></i> Reviews</a>

    <div class="bottom-nav">
        <a th:href="@{/catalogue}" class="nav-item"><i class="fas fa-store"></i> Storefront</a>
        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="nav-item" style="background: none; border: none; width: 100%; cursor: pointer;"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
        </form>
    </div>
</div>

<div class="main">
    <div class="main-header">
        <h1>Control Center</h1>
        <p>Overview of your hardware ecosystem and customer engagement.</p>
    </div>

    <div class="grid">
        <a th:href="@{/admin/gerants}" class="card">
            <div class="icon-box"><i class="fas fa-user"></i></div>
            <h3>Users</h3>
            <p>Manage managers</p>
        </a>

        <a th:href="@{/gerant/dashboard}" class="card">
            <div class="icon-box"><i class="fas fa-store"></i></div>
            <h3>Store</h3>
            <p>Hardware catalog</p>
        </a>

        <a th:href="@{/admin/avis}" class="card">
            <div class="icon-box"><i class="fas fa-comment-dots"></i></div>
            <h3>Reviews</h3>
            <p>Customer feedback</p>
        </a>

        <a th:href="@{/admin/commandes}" class="card">
            <div class="icon-box"><i class="fas fa-shopping-cart"></i></div>
            <h3>Orders</h3>
            <p>Pending shipments</p>
        </a>
    </div>

    <div style="background: #1a1c1d; border-radius: 32px; padding: 60px; color: white; text-align: center;">
        <h2 style="font-size: 32px; font-weight: 600; margin: 0 0 10px 0;">System Health</h2>
        <p style="color: #a1a1aa; margin: 0;">Everything is running smoothly.</p>
    </div>
</div>

</body>
</html>
