<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/img/dark.png}">
    <meta charset="UTF-8">
    <title>Admin | Gestion des Utilisateurs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; --primary: #1a1c1d; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 240px; background: var(--bg); border-right: 1px solid rgba(0,0,0,0.04); padding: 30px 0; display: flex; flex-direction: column; flex-shrink: 0; }
        .brand { padding: 0 30px; margin-bottom: 40px; }
        .brand h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
        .brand span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 30px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-item.active { background: var(--surface); color: var(--text-main); font-weight: 600; border-radius: 0 999px 999px 0; margin-right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .nav-item i { width: 20px; font-size: 16px; }
        .nav-item:hover:not(.active) { color: var(--text-main); }
        .bottom-nav { margin-top: auto; }

        /* Main */
        .main { flex: 1; padding: 40px 6%; overflow-y: auto; }
        .main-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .main-header h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.04em; margin: 0 0 10px 0; }
        .main-header p { color: var(--text-muted); font-size: 16px; margin: 0; max-width: 600px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }

        /* Table */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { color: #86868b; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
        th:nth-child(1) { width: 60px; }
        th:nth-child(4) { width: 200px; }
        th:nth-child(5) { width: 130px; }
        th:nth-child(6) { width: 90px; }
        th:nth-child(7) { width: 100px; }
        td { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
        .badge-admin  { background: #fde8e8; color: #b91c1c; }
        .badge-gerant { background: #e0f2fe; color: #0369a1; }
        .badge-client { background: #d4edda; color: #155724; }
        .actions-cell { display: flex; align-items: center; gap: 8px; }
        .btn-action { color: #9ca3af; background: transparent; border: none; cursor: pointer; font-size: 15px; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; text-decoration: none; padding: 0; outline: none; }
        .btn-action:hover { background: #f3f4f6; color: #4b5563; }
        .btn-delete-action { color: #9ca3af; background: transparent; border: none; cursor: pointer; font-size: 15px; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; padding: 0; outline: none; text-decoration: none; }
        .btn-delete-action:hover { background: #fee2e2; color: #ef4444; }
        .empty-state { text-align: center; color: #888; padding: 30px; }
        .error-msg { color: #ff3b30; font-weight: 600; margin-bottom: 16px; padding: 12px 16px; background: #fff0f0; border-radius: 10px; }

        /* Filter tabs */
        .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .filter-tab { padding: 7px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; background: var(--bg); color: var(--text-muted); text-decoration: none; }
        .filter-tab:hover { background: #e5e5ea; color: var(--text-main); }
        .filter-tab.active { background: var(--text-main); color: #fff; }

        /* Add button */
        .btn-primary { background: #1a1c1d; color: white; padding: 11px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 8px; }
        .btn-primary:hover { background: #000; }

        /* Modal overlay */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9999; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }

        /* Modal card */
        .modal { background: white; border-radius: 24px; padding: 40px; width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative; z-index: 10000; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal h2 { margin: 0 0 28px 0; font-size: 20px; font-weight: 700; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: #e5e5ea; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.04em; }
        .form-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e0e0e5; outline: none; font-family: inherit; font-size: 14px; box-sizing: border-box; transition: border-color 0.2s; }
        .form-input:focus { border-color: #1a1c1d; box-shadow: 0 0 0 3px rgba(26,28,29,0.08); }
        .form-select { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e0e0e5; outline: none; font-family: inherit; font-size: 14px; background: white; box-sizing: border-box; }
        .modal-actions { display: flex; gap: 12px; margin-top: 28px; }
        .btn-save { flex: 1; background: #1a1c1d; color: white; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-save:hover { background: #000; }
        .btn-cancel { flex: 1; background: var(--bg); color: var(--text-muted); padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-cancel:hover { background: #e5e5ea; }

        /* Delete modal */
        .modal-delete { width: 400px; padding: 40px 32px; text-align: center; }
        .modal-delete .icon-warning { background: #fee2e2; color: #ef4444; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 20px auto; }
        .modal-delete h2 { font-size: 18px; margin-bottom: 12px; }
        .modal-delete p { color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-bottom: 28px; }
        .btn-delete-confirm { flex: 1; background: #ef4444; color: white; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-delete-confirm:hover { background: #dc2626; }

        /* Toast */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); display: flex; padding: 16px 20px; align-items: flex-start; gap: 12px; min-width: 300px; position: relative; overflow: hidden; pointer-events: auto; animation: toastSlideIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) forwards; border: 1px solid rgba(0,0,0,0.05); }
        .toast.closing { animation: toastSlideOut 0.3s ease forwards; }
        .toast-icon { color: #10b981; font-size: 20px; margin-top: 2px; }
        .toast-content { flex: 1; }
        .toast-title { font-size: 15px; font-weight: 600; color: #111827; margin: 0 0 4px 0; display: block; }
        .toast-msg { font-size: 13px; color: #6b7280; margin: 0; }
        .toast-close { color: #d1d5db; cursor: pointer; font-size: 14px; background: none; border: none; padding: 4px; display: flex; transition: color 0.2s; margin-top: 2px; }
        .toast-close:hover { color: #6b7280; }
        .toast-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: #34d399; width: 100%; transform-origin: left; animation: toastProgress 3s linear forwards; }
        @keyframes toastSlideIn { from { opacity: 0; transform: translateX(40px) scale(0.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes toastSlideOut { from { opacity: 1; transform: translateX(0) scale(1); } to { opacity: 0; transform: translateX(40px) scale(0.95); } }
        @keyframes toastProgress { from { transform: scaleX(1); } to { transform: scaleX(0); } }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin_sidebar :: adminSidebar('gerants')}"></div>

<div class="main">
    <div class="main-header">
        <div>
            <h1>Users Management</h1>
            <p>Manage administrator, agent, and client accounts. Maintain role-based access control.</p>
        </div>
        <button class="btn-primary" onclick="openAddModal()">
            <i class="fas fa-plus"></i> Ajouter un agent
        </button>
    </div>

    <div class="container">
        <p class="error-msg" th:if="${userError}" th:text="${userError}"></p>

        <div class="filter-tabs">
            <a th:href="@{/admin/gerants}" class="filter-tab" th:classappend="${activeFilter == null} ? ' active'">Tous</a>
            <a th:href="@{/admin/gerants(role='CLIENT')}" class="filter-tab" th:classappend="${activeFilter == 'CLIENT'} ? ' active'">Clients</a>
            <a th:href="@{/admin/gerants(role='GERANT')}" class="filter-tab" th:classappend="${activeFilter == 'GERANT'} ? ' active'">Agents</a>
        </div>

        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Username</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Téléphone</th>
                <th>Rôle</th>
                <th style="color: #8fa0b5; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;">ACTIONS</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}" th:attr="data-user-id=${u.id}">
                <td th:text="${u.id}" style="color:#86868b;"></td>
                <td th:text="${u.username}" style="font-weight:600;"></td>
                <td th:text="${u.nom}" style="color:#444;"></td>
                <td th:text="${u.email}" style="color:#444;"></td>
                <td th:text="${u.telephone}" style="color:#444;"></td>
                <td>
                    <span class="badge"
                          th:classappend="${u.role == 'ADMIN'} ? 'badge-admin' : (${u.role == 'GERANT'} ? 'badge-gerant' : 'badge-client')"
                          th:text="${u.role == 'ADMIN'} ? 'Admin' : (${u.role == 'GERANT'} ? 'Agent' : 'Client')">
                    </span>
                </td>
                <td>
                    <div th:if="${u.role != 'ADMIN'}" class="actions-cell">
                        <button th:data-id="${u.id}"
                                th:data-username="${u.username}"
                                th:data-role="${u.role}"
                                th:data-nom="${u.nom}"
                                th:data-email="${u.email}"
                                th:data-telephone="${u.telephone}"
                                onclick="openEditModal(this)"
                                class="btn-action" title="Edit User">
                            <i class="far fa-edit"></i>
                        </button>
                        <button type="button" class="btn-delete-action" title="Delete User"
                                th:attr="onclick=|openDeleteModal(${u.id}, '${u.username}')|">
                            <i class="far fa-trash-alt"></i>
                        </button>
                    </div>
                    <span th:if="${u.role == 'ADMIN'}" style="color:#ccc; font-size:13px;">protégé</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="7" class="empty-state">Aucun utilisateur trouvé.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal" onclick="if(event.target===this)closeModal('deleteModal')">
    <div class="modal modal-delete">
        <div class="icon-warning"><i class="fas fa-trash-alt"></i></div>
        <h2>Delete User</h2>
        <p id="deleteModalText"></p>
        <form onsubmit="confirmDelete(event)">
            <div class="modal-actions" style="justify-content:center;">
                <button type="button" class="btn-cancel" onclick="closeModal('deleteModal')">Cancel</button>
                <button type="submit" class="btn-delete-confirm" id="deleteSubmitBtn">Delete</button>
            </div>
        </form>
    </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal" onclick="closeOnOverlay(event, 'addModal')">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('addModal')"><i class="fas fa-times"></i></button>
        <h2>Ajouter un Agent</h2>
        <form id="addUserForm" th:action="@{/admin/gerants/save}" method="post" onsubmit="submitAddUser(event)">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" class="form-input" placeholder="ex: jean.dupont" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <input type="hidden" name="role" value="GERANT">
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal('addModal')">Annuler</button>
                <button type="submit" class="btn-save">Ajouter</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" onclick="closeOnOverlay(event, 'editModal')">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('editModal')"><i class="fas fa-times"></i></button>
        <h2>Modifier l'utilisateur</h2>
        <form id="editUserForm" th:action="@{/admin/gerants/update}" method="post" onsubmit="submitEditUser(event)">
            <input type="hidden" name="id" id="editUserId">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" id="editUsername" class="form-input" required>
            </div>
            <div class="form-group">
                <label>Rôle</label>
                <select name="role" id="editRole" class="form-select">
                    <option value="GERANT">Agent</option>
                    <option value="CLIENT">Client</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" name="nom" id="editNom" class="form-input" placeholder="—">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" id="editEmail" class="form-input" placeholder="—">
            </div>
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" name="telephone" id="editTelephone" class="form-input" placeholder="—">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal('editModal')">Annuler</button>
                <button type="submit" class="btn-save">Enregistrer</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openAddModal() {
        document.getElementById('addModal').classList.add('open');
    }

    function openEditModal(btn) {
        document.getElementById('editUserId').value = btn.dataset.id;
        document.getElementById('editUsername').value = btn.dataset.username;
        document.getElementById('editRole').value = btn.dataset.role;
        document.getElementById('editNom').value = btn.dataset.nom || '';
        document.getElementById('editEmail').value = btn.dataset.email || '';
        document.getElementById('editTelephone').value = btn.dataset.telephone || '';
        document.getElementById('editModal').classList.add('open');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('open');
    }

    function closeOnOverlay(event, id) {
        if (event.target === document.getElementById(id)) closeModal(id);
    }

    let deleteUserId = null;
    function openDeleteModal(id, username) {
        deleteUserId = id;
        document.getElementById('deleteModalText').innerHTML = `Are you sure you want to delete user "<strong>${username}</strong>"? This action is irreversible.`;
        document.getElementById('deleteModal').classList.add('open');
    }

    async function confirmDelete(e) {
        e.preventDefault();
        const btn = document.getElementById('deleteSubmitBtn');
        btn.disabled = true; btn.textContent = 'Deleting...';
        try {
            const res = await fetch('/admin/gerants/delete/' + deleteUserId, { credentials: 'same-origin' });
            if (res.ok || res.redirected) {
                closeModal('deleteModal');
                const username = document.getElementById('deleteModalText').querySelector('strong').textContent;
                showToast('User deleted', `"${username}" has been removed.`);
                const row = document.querySelector(`[data-user-id="${deleteUserId}"]`);
                if (row) row.remove();
            } else {
                alert('Error deleting user.');
            }
        } catch { alert('Network error.'); }
        btn.disabled = false; btn.textContent = 'Delete';
    }

    function showToast(title, message) {
        let container = document.getElementById('toastWrapper');
        if (!container) { container = document.createElement('div'); container.id = 'toastWrapper'; container.className = 'toast-container'; document.body.appendChild(container); }
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `
            <div class="toast-icon"><i class="far fa-check-circle"></i></div>
            <div class="toast-content"><strong class="toast-title">${title}</strong><p class="toast-msg">${message}</p></div>
            <button class="toast-close" onclick="this.closest('.toast').classList.add('closing');setTimeout(()=>this.closest('.toast').remove(),300)"><i class="fas fa-times"></i></button>
            <div class="toast-progress"></div>`;
        container.appendChild(toast);
        setTimeout(() => { if (toast.parentElement) { toast.classList.add('closing'); setTimeout(() => toast.remove(), 300); } }, 3000);
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            closeModal('addModal');
            closeModal('editModal');
            closeModal('deleteModal');
        }
    });

    function formToParams(form) {
        return new URLSearchParams(new FormData(form)).toString();
    }

    async function submitAddUser(e) {
        e.preventDefault();
        const form = document.getElementById('addUserForm');
        const btn = form.querySelector('[type="submit"]');
        const username = form.querySelector('[name="username"]').value;
        btn.disabled = true; btn.textContent = 'Adding...';
        try {
            const res = await fetch(form.action, {
                method: 'POST',
                body: formToParams(form),
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            if (res.ok || res.redirected) {
                closeModal('addModal');
                form.reset();
                showToast('User added', `"${username}" has been created successfully.`);
                setTimeout(() => window.location.reload(), 1500);
            } else {
                alert('Error adding user.');
            }
        } catch { alert('Network error.'); }
        btn.disabled = false; btn.textContent = 'Ajouter';
    }

    async function submitEditUser(e) {
        e.preventDefault();
        const form = document.getElementById('editUserForm');
        const btn = form.querySelector('[type="submit"]');
        const username = document.getElementById('editUsername').value;
        btn.disabled = true; btn.textContent = 'Saving...';
        try {
            const res = await fetch(form.action, {
                method: 'POST',
                body: formToParams(form),
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            if (res.ok || res.redirected) {
                closeModal('editModal');
                showToast('User updated', `"${username}" has been saved successfully.`);
                setTimeout(() => window.location.reload(), 1500);
            } else {
                alert('Error saving user.');
            }
        } catch { alert('Network error.'); }
        btn.disabled = false; btn.textContent = 'Enregistrer';
    }

    const hasError = /*[[${userError != null}]]*/ false;
    if (hasError) openAddModal();
</script>
</body>
</html>
