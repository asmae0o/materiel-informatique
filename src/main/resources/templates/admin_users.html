<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin | Gérer les Gérants</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--bg); border-right: 1px solid rgba(0,0,0,0.04); padding: 30px 0; display: flex; flex-direction: column; }
        .brand { padding: 0 30px; margin-bottom: 40px; }
        .brand h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
        .brand span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 30px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-item.active { background: var(--surface); color: var(--text-main); font-weight: 600; border-radius: 0 999px 999px 0; margin-right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .nav-item i { width: 20px; font-size: 16px; }
        .nav-item:hover:not(.active) { color: var(--text-main); }
        .bottom-nav { margin-top: auto; }
        .main { flex: 1; padding: 40px 6%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #86868b; font-weight: 600; }
        .btn-add { background: #0071e3; color: white; padding: 12px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; }
        .badge-active { background: #d4edda; color: #155724; padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .form-input { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 250px; outline: none; font-family: inherit; }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin_sidebar :: adminSidebar('gerants')}"></div>

<div class="main">

<div class="header">
    <h1 style="margin: 0;">👥 Gestion des Gérants</h1>
</div>

<div class="container">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Email</th>
            <th>Statut</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="g : ${gerants}">
            <td th:text="${g.id}"></td>
            <td th:text="${g.nom}"></td>
            <td th:text="${g.email}"></td>
            <td><span class="badge-active" th:text="${g.statut}"></span></td>
            <td>
                <a th:href="@{'/admin/gerants/delete/' + ${g.id}}"
                   onclick="return confirm('Bannir ce gérant définitivement ?')"
                   style="color: #ff3b30; text-decoration: none; font-weight: 600;">
                    <i class="fas fa-ban"></i> Bannir
                </a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(gerants)}">
            <td colspan="5" style="text-align: center; color: #888; padding: 30px;">
                Aucun gérant trouvé dans la base de données.
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="container" id="ajouter-gerant">
    <h3 style="margin-top: 0;">+ Ajouter un Gérant</h3>
    <form th:action="@{/admin/gerants/save}" method="post" style="display: flex; gap: 15px; align-items: center;">
        <input type="text" name="nom" class="form-input" placeholder="Nom complet" required>
        <input type="email" name="email" class="form-input" placeholder="Adresse Email" required>
        <button type="submit" class="btn-add">Ajouter le Gérant</button>
    </form>
</div>

<div class="container">
    <h3 style="margin-top: 0;">Clients inscrits via Sign Up</h3>
    <table>
        <thead>
        <tr>
            <th>Username</th>
            <th>Rôle</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${clients}">
            <td th:text="${u}"></td>
            <td><span class="badge-active">CLIENT</span></td>
        </tr>
        <tr th:if="${#lists.isEmpty(clients)}">
            <td colspan="2" style="text-align: center; color: #888; padding: 20px;">
                Aucun client inscrit pour le moment.
            </td>
        </tr>
        </tbody>
    </table>
</div>

</div>
</body>
</html>
