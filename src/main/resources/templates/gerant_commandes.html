<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gérant | Commandes Clients</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; margin: 0; font-family: 'Inter', sans-serif; background: #f0f2f5; height: 100vh; }
        .sidebar { width: 260px; background: #1c1c1e; color: white; padding: 30px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .sidebar h2 { color: #0071e3; margin-bottom: 40px; }
        .sidebar a { display: block; color: #a1a1a6; text-decoration: none; padding: 12px 0; font-weight: 500; }
        .sidebar a.active { color: white; border-left: 3px solid #0071e3; padding-left: 10px; }

        table { width: 100%; background: white; border-radius: 16px; border-collapse: collapse; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid #f2f2f2; }
        th { background: #fafafa; font-weight: 600; color: #86868b; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-complete { background: #d4edda; color: #155724; }
        .btn-logout { background: none; border: none; color: #ff3b30; font-weight: 600; cursor: pointer; text-align: left; padding: 0; font-family: inherit; font-size: 1rem; margin-top: auto; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>Dashboard</h2>
    <a th:href="@{/gerant/dashboard}"><i class="fas fa-box"></i> Produits</a>
    <a th:href="@{/gerant/categories}"><i class="fas fa-layer-group"></i> Catégories</a>
    <a th:href="@{/gerant/promotions}"><i class="fas fa-percentage"></i> Promotions</a>
    <a th:href="@{/gerant/commandes}" class="active"><i class="fas fa-file-invoice-dollar"></i> Commandes</a>
    <form th:action="@{/logout}" method="post" style="margin-top: auto;">
        <button type="submit" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
    </form>
</div>
<div class="main">
    <h1>📑 Suivi des Commandes</h1>
    <p style="color: #666;">Commandes liées à vos produits.</p>

    <table>
        <thead>
        <tr>
            <th>#Commande</th>
            <th>Produit</th>
            <th>Client</th>
            <th>Quantité</th>
            <th>Total</th>
            <th>Statut</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>CMD-1234</td>
            <td>MacBook Pro M3</td>
            <td>Asmae</td>
            <td>1</td>
            <td>25000 MAD</td>
            <td><span class="status status-complete">LIVRÉ</span></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
