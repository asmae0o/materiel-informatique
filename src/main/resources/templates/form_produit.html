<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MyHardware | Produit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f5f5f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: white; padding: 40px; border-radius: 24px; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; font-weight: 600; color: #1d1d1f; text-align: center; margin-bottom: 30px; }
        label { font-size: 0.85rem; color: #86868b; font-weight: 600; margin-left: 5px; display: block; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 20px 0; border: 1px solid #d2d2d7; border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 1rem; outline: none; }
        button { background: #0071e3; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .cancel-link { display: block; text-align: center; margin-top: 20px; color: #86868b; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 th:text="${produit.id != null ? '✏️ Modifier le Produit' : '📦 Nouveau Matériel'}">Produit</h2>

    <form th:action="@{${formAction ?: '/gerant/save'}}" th:object="${produit}" method="post" enctype="multipart/form-data">

        <input type="hidden" th:if="${produit.id != null}" th:field="*{id}">

        <label>Nom du produit</label>
        <input type="text" th:field="*{nom}" required>

        <label>Description</label>
        <input type="text" th:field="*{description}">

        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>Prix (MAD)</label>
                <input type="number" step="0.01" th:field="*{prix}" required>
            </div>
            <div style="flex: 1;">
                <label>Stock</label>
                <input type="number" th:field="*{quantiteStock}" required>
            </div>
        </div>

        <label>Marque</label>
        <select name="marque" id="marque" required>
            <option value="">-- Choisir Marque --</option>
            <option th:each="m : ${marques}"
                    th:value="${m.id}"
                    th:text="${m.nom}"
                    th:selected="${produit.marque != null and produit.marque.id == m.id}">
            </option>
        </select>

        <label>Catégorie</label>
        <select name="categorie" id="categorie" required>
            <option value="">-- Choisir Catégorie --</option>
            <option th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.nom}"
                    th:selected="${produit.categorie != null and produit.categorie.id == c.id}">
            </option>
        </select>

        <label>Image du produit</label>
        <div id="image-preview-container" th:style="${produit.getPrimaryImage() != null ? 'margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap;' : 'display: none; margin-bottom: 10px; gap: 8px; flex-wrap: wrap;'}">
            <div>
                <img id="image-preview" th:src="${produit.getPrimaryImage() != null ? produit.getPrimaryImage() : ''}" alt="" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px; border: 1px solid #d2d2d7;">
            </div>
        </div>
        <input type="file" id="image-input" name="images" accept="image/*" multiple style="width: 100%; padding: 10px; margin: 8px 0 20px 0; border: 1px solid #d2d2d7; border-radius: 12px; box-sizing: border-box; font-family: inherit;">

        <button type="submit">Enregistrer</button>
    </form>

    <a th:href="@{${cancelUrl ?: '/gerant/dashboard'}}" class="cancel-link">Annuler</a>
</div>

<script>
    document.getElementById('image-input').addEventListener('change', function(event) {
        if(event.target.files && event.target.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var previewImg = document.getElementById('image-preview');
                var previewContainer = document.getElementById('image-preview-container');
                previewImg.src = e.target.result;
                previewContainer.style.display = 'flex';
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    });
</script>



</body>
</html>
