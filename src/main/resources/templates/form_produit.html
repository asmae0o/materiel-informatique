<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MyHardware | Nouveau Produit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f5f5f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: white; padding: 40px; border-radius: 24px; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; font-weight: 600; color: #1d1d1f; text-align: center; margin-bottom: 30px; }
        label { font-size: 0.85rem; color: #86868b; font-weight: 600; margin-left: 5px; display: block; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 20px 0; border: 1px solid #d2d2d7; border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 1rem; outline: none; }
        button { background: #0071e3; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .cancel-link { display: block; text-align: center; margin-top: 20px; color: #86868b; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>📦 Nouveau Matériel</h2>

    <form th:action="@{/gerant/save}" th:object="${produit}" method="post">

        <label>Nom du produit</label>
        <input type="text" th:field="*{nom}" required>

        <label>Description</label>
        <input type="text" th:field="*{description}">

        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>Prix (MAD)</label>
                <input type="number" step="0.01" th:field="*{prix}" required>
            </div>
            <div style="flex: 1;">
                <label>Stock</label>
                <input type="number" th:field="*{quantiteStock}" required>
            </div>
        </div>

        <label>Marque</label>
        <select th:field="*{marque}" required>
            <option value="">-- Choisir Marque --</option>
            <option th:if="${marques != null}" th:each="m : ${marques}" th:value="${m.id}" th:text="${m.nom}"></option>
        </select>

        <label>Catégorie</label>
        <select th:field="*{categorie}" required>
            <option value="">-- Choisir Catégorie --</option>
            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.nom}"></option>
        </select>

        <button type="submit">Enregistrer</button>
    </form>

    <a th:href="@{/gerant/dashboard}" class="cancel-link">Annuler</a>
</div>

</body>
</html>
