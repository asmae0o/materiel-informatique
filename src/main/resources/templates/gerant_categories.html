<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/img/dark.png}">
    <meta charset="UTF-8">
    <title>Categories | Gérant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; --primary: #1a1c1d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: var(--text-main); }
        .sidebar { width: 240px; background: var(--bg); border-right: 1px solid rgba(0,0,0,0.04); padding: 30px 0; display: flex; flex-direction: column; flex-shrink: 0; }
        .brand { padding: 0 30px; margin-bottom: 40px; }
        .brand h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
        .brand span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 30px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-item.active { background: var(--surface); color: var(--text-main); font-weight: 600; border-radius: 0 999px 999px 0; margin-right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .nav-item i { width: 20px; font-size: 16px; }
        .nav-item:hover:not(.active) { color: var(--text-main); }
        .bottom-nav { margin-top: auto; }

        .main { flex: 1; padding: 40px 6%; overflow-y: auto; background: var(--surface); }
        .main-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .main-header h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.03em; margin: 0 0 8px; }
        .main-header p { color: var(--text-muted); font-size: 15px; margin: 0; }
        .btn-primary { background: #1a1c1d; color: white; padding: 12px 24px; border-radius: 999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary:hover { background: #000; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 15px 10px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.08); }
        th:nth-child(1) { width: 80px; }
        th:nth-child(3) { width: 80px; }
        td { padding: 18px 10px; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 14px; }
        .btn-action { color: #9ca3af; background: transparent; border: none; cursor: pointer; font-size: 15px; width: 36px; height: 36px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-action:hover { background: #f3f4f6; color: #1a1c1d; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 24px; padding: 40px; width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .modal h2 { margin: 0 0 24px; font-size: 20px; font-weight: 700; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: #e5e5ea; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); font-size: 15px; outline: none; font-family: inherit; background: var(--bg); box-sizing: border-box; transition: 0.2s; }
        .form-input:focus { border-color: #1a1c1d; background: #fff; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn-save { flex: 1; background: #1a1c1d; color: white; padding: 14px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-save:hover { background: #000; }
        .btn-cancel { flex: 1; background: var(--bg); color: var(--text-muted); padding: 14px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-cancel:hover { background: #e5e5ea; }

        .toast { position: fixed; bottom: 30px; right: 30px; background: #1a1c1d; color: #fff; padding: 16px 22px; border-radius: 16px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.18); z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast i { color: #34c759; font-size: 18px; }
    </style>
</head>
<body>
<div th:replace="~{fragments/gerant_sidebar :: gerantSidebar('categories')}"></div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg">Done!</span></div>

<div class="main">
    <div class="main-header">
        <div>
            <h1>Categories</h1>
            <p>Add and rename product categories.</p>
        </div>
        <button class="btn-primary" onclick="openModal('addModal')"><i class="fas fa-plus"></i> Add Category</button>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Edit</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categories}">
            <td th:text="'#' + ${cat.id}" style="color:var(--text-muted);font-size:13px;"></td>
            <td th:text="${cat.nom}" style="font-weight:600;"></td>
            <td>
                <button class="btn-action" th:data-id="${cat.id}" th:data-nom="${cat.nom}" onclick="openEditModal(this)" title="Edit">
                    <i class="far fa-edit"></i>
                </button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeModal('addModal')">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('addModal')"><i class="fas fa-times"></i></button>
        <h2>Add Category</h2>
        <form id="addForm" onsubmit="submitCat(event,'addForm','/gerant/categories/save','addModal','Category added!')">
            <div class="form-group">
                <label>Category Name</label>
                <input type="text" name="nom" class="form-input" placeholder="ex: Laptops" required autofocus>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
                <button type="submit" class="btn-save" id="addSubmitBtn">Add Category</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeModal('editModal')">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('editModal')"><i class="fas fa-times"></i></button>
        <h2>Edit Category</h2>
        <form id="editForm" onsubmit="submitCat(event,'editForm','/gerant/categories/update','editModal','Category updated!')">
            <input type="hidden" name="id" id="editCatId">
            <div class="form-group">
                <label>Category Name</label>
                <input type="text" name="nom" id="editCatNom" class="form-input" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal('editModal')">Cancel</button>
                <button type="submit" class="btn-save" id="editSubmitBtn">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    function openModal(id) { document.getElementById(id).classList.add('open'); }

    function openEditModal(btn) {
        document.getElementById('editCatId').value = btn.dataset.id;
        document.getElementById('editCatNom').value = btn.dataset.nom;
        openModal('editModal');
    }

    async function submitCat(event, formId, url, modalId, msg) {
        event.preventDefault();
        const form = document.getElementById(formId);
        const btn = form.querySelector('[type="submit"]');
        const orig = btn.textContent;
        btn.disabled = true; btn.textContent = 'Saving...';
        try {
            const body = new URLSearchParams(new FormData(form)).toString();
            const res = await fetch(url, { method: 'POST', body, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
            if (res.ok || res.redirected) {
                closeModal(modalId);
                showToast(msg);
                setTimeout(() => window.location.reload(), 1400);
            } else { alert('Error. Please try again.'); btn.disabled = false; btn.textContent = orig; }
        } catch { alert('Network error.'); btn.disabled = false; btn.textContent = orig; }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal('addModal'); closeModal('editModal'); } });
</script>
</body>
</html>
