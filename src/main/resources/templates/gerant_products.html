<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/img/dark.png}">
    <meta charset="UTF-8">
    <title>Products | Gérant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; --primary: #1a1c1d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: var(--text-main); }
        .sidebar { width: 240px; background: var(--bg); border-right: 1px solid rgba(0,0,0,0.04); padding: 30px 0; display: flex; flex-direction: column; flex-shrink: 0; }
        .brand { padding: 0 30px; margin-bottom: 40px; }
        .brand h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
        .brand span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 30px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-item.active { background: var(--surface); color: var(--text-main); font-weight: 600; border-radius: 0 999px 999px 0; margin-right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .nav-item i { width: 20px; font-size: 16px; }
        .nav-item:hover:not(.active) { color: var(--text-main); }
        .bottom-nav { margin-top: auto; }

        .main { flex: 1; padding: 0; overflow-y: auto; background: var(--surface); }
        .content-area { padding: 40px 60px; }
        .main-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .main-header h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.03em; margin: 0 0 8px; }
        .main-header p { color: var(--text-muted); font-size: 15px; margin: 0; }
        .btn-primary { background: #1a1c1d; color: white; padding: 12px 24px; border-radius: 999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary:hover { background: #000; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 15px 10px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.08); }
        th:nth-child(1) { width: 80px; }
        th:nth-child(3) { width: 120px; }
        th:nth-child(4) { width: 100px; }
        th:nth-child(5) { width: 80px; }
        td { padding: 20px 10px; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 14px; }
        .prod-name { font-size: 15px; font-weight: 600; color: var(--text-main); margin: 0 0 4px; }
        .prod-cat { font-size: 12px; color: var(--text-muted); }
        .stock-good { color: #137333; font-weight: 600; }
        .stock-bad { color: #d93025; font-weight: 600; }
        .btn-action { color: #9ca3af; background: transparent; border: none; cursor: pointer; font-size: 15px; width: 36px; height: 36px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-action:hover { background: #f3f4f6; color: #1a1c1d; }

        /* Modals */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 24px; padding: 40px; width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative; animation: slideUp 0.2s ease; max-height: 90vh; overflow-y: auto; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .modal h2 { margin: 0 0 28px; font-size: 20px; font-weight: 700; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: #e5e5ea; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e0e0e5; outline: none; font-family: inherit; font-size: 14px; box-sizing: border-box; background: var(--bg); transition: 0.2s; }
        .form-input:focus { border-color: #1a1c1d; background: #fff; }
        .form-row { display: flex; gap: 14px; }
        .form-row .form-group { flex: 1; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn-save { flex: 1; background: #1a1c1d; color: white; padding: 14px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-save:hover { background: #000; }
        .btn-cancel { flex: 1; background: var(--bg); color: var(--text-muted); padding: 14px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-cancel:hover { background: #e5e5ea; }

        /* Toast */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #1a1c1d; color: #fff; border-radius: 14px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.2); animation: toastIn 0.3s ease; }
        .toast i { color: #34c759; font-size: 17px; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div th:replace="~{fragments/gerant_sidebar :: gerantSidebar('products')}"></div>

<div id="toastWrapper" class="toast-container"></div>

<div class="main">
    <div class="content-area">
        <div class="main-header">
            <div>
                <h1>Products</h1>
                <p>Add and update products. Stock and pricing management.</p>
            </div>
            <button class="btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Add Product</button>
        </div>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Edit</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${produits}">
                <td th:text="'#' + ${p.id}" style="color:var(--text-muted);font-size:13px;"></td>
                <td>
                    <div style="display:flex;align-items:center;gap:14px;">
                        <div style="width:44px;height:44px;background:var(--bg);border-radius:10px;overflow:hidden;display:flex;justify-content:center;align-items:center;color:#c1c6d6;flex-shrink:0;">
                            <img th:if="${p.getPrimaryImage() != null}" th:src="@{${p.getPrimaryImage()}}" alt="" style="width:100%;height:100%;object-fit:cover;">
                            <i th:unless="${p.getPrimaryImage() != null}" class="fas fa-box" style="font-size:16px;"></i>
                        </div>
                        <div>
                            <div class="prod-name" th:text="${p.nom}"></div>
                            <div class="prod-cat" th:text="${p.marque != null ? p.marque.nom : '—'}"></div>
                        </div>
                    </div>
                </td>
                <td th:text="${p.prix} + ' MAD'" style="font-weight:500;"></td>
                <td th:class="${p.quantiteStock > 10 ? 'stock-good' : 'stock-bad'}" th:text="${p.quantiteStock} + ' pcs'"></td>
                <td>
                    <button class="btn-action" title="Edit"
                            th:data-id="${p.id}"
                            th:data-nom="${p.nom}"
                            th:data-description="${p.description}"
                            th:data-prix="${p.prix}"
                            th:data-stock="${p.quantiteStock}"
                            th:data-marque="${p.marque?.id}"
                            th:data-categorie="${p.categorie?.id}"
                            onclick="openEditModal(this)">
                        <i class="far fa-edit"></i>
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeModal('addModal')">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('addModal')"><i class="fas fa-times"></i></button>
        <h2>New Product</h2>
        <form id="addForm" onsubmit="submitProduct(event,'addForm','addModal',false)">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="nom" class="form-input" placeholder="ex: MacBook Pro 16" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" name="description" class="form-input" placeholder="Short description...">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Price (MAD)</label>
                    <input type="number" step="0.01" name="prix" class="form-input" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" name="quantiteStock" class="form-input" placeholder="0" required>
                </div>
            </div>
            <div class="form-group">
                <label>Brand</label>
                <select name="marque" class="form-input" required>
                    <option value="">— Choose Brand —</option>
                    <option th:each="m : ${marques}" th:value="${m.id}" th:text="${m.nom}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="categorie" class="form-input" required>
                    <option value="">— Choose Category —</option>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.nom}"></option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
                <button type="submit" class="btn-save" id="addSubmitBtn">Create Product</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeModal('editModal')">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('editModal')"><i class="fas fa-times"></i></button>
        <h2>Edit Product</h2>
        <form id="editForm" onsubmit="submitProduct(event,'editForm','editModal',true)">
            <input type="hidden" name="id" id="editId">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="nom" id="editNom" class="form-input" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" name="description" id="editDesc" class="form-input">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Price (MAD)</label>
                    <input type="number" step="0.01" name="prix" id="editPrix" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" name="quantiteStock" id="editStock" class="form-input" required>
                </div>
            </div>
            <div class="form-group">
                <label>Brand</label>
                <select name="marque" id="editMarque" class="form-input" required>
                    <option value="">— Choose Brand —</option>
                    <option th:each="m : ${marques}" th:value="${m.id}" th:text="${m.nom}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="categorie" id="editCategorie" class="form-input" required>
                    <option value="">— Choose Category —</option>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.nom}"></option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal('editModal')">Cancel</button>
                <button type="submit" class="btn-save" id="editSubmitBtn">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function openAddModal() {
        document.getElementById('addForm').reset();
        document.getElementById('addModal').classList.add('open');
    }

    function openEditModal(btn) {
        document.getElementById('editId').value = btn.dataset.id;
        document.getElementById('editNom').value = btn.dataset.nom;
        document.getElementById('editDesc').value = btn.dataset.description || '';
        document.getElementById('editPrix').value = btn.dataset.prix;
        document.getElementById('editStock').value = btn.dataset.stock;
        document.getElementById('editMarque').value = btn.dataset.marque || '';
        document.getElementById('editCategorie').value = btn.dataset.categorie || '';
        document.getElementById('editModal').classList.add('open');
    }

    async function submitProduct(event, formId, modalId, isEdit) {
        event.preventDefault();
        const form = document.getElementById(formId);
        const btn = form.querySelector('[type="submit"]');
        const orig = btn.textContent;
        btn.disabled = true; btn.textContent = 'Saving...';
        try {
            const body = new URLSearchParams(new FormData(form)).toString();
            const url = isEdit ? '/gerant/products/update' : '/gerant/products/save';
            const res = await fetch(url, { method: 'POST', body, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
            if (res.ok || res.redirected) {
                closeModal(modalId);
                showToast(isEdit ? 'Product updated successfully.' : 'Product created successfully.');
                setTimeout(() => window.location.reload(), 1400);
            } else { alert('Error. Please try again.'); btn.disabled = false; btn.textContent = orig; }
        } catch { alert('Network error.'); btn.disabled = false; btn.textContent = orig; }
    }

    function showToast(msg) {
        const c = document.getElementById('toastWrapper');
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = `<i class="fas fa-check-circle"></i><span>${msg}</span>`;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal('addModal'); closeModal('editModal'); } });
</script>
</body>
</html>
