<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/img/dark.png}">
    <meta charset="UTF-8">
    <title>Review your bag | Quantum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; --primary: #0071e3; }
        body { font-family: 'Inter', sans-serif; background-color: var(--surface); color: var(--text-main); margin: 0; padding: 0; }

        .navbar { display: flex; justify-content: space-between; padding: 20px 5%; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .logo { font-weight: 700; color: var(--text-main); text-decoration: none; font-size: 18px;}

        .container { max-width: 900px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.04em; margin: 0 0 10px 0; }
        p.subtitle { color: var(--text-muted); font-size: 16px; margin-bottom: 60px;}

        /* Cart Items */
        .cart-list { border-top: 1px solid rgba(0,0,0,0.08); border-bottom: 1px solid rgba(0,0,0,0.08); }
        .cart-item { display: flex; padding: 40px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .cart-item:last-child { border-bottom: none; }

        .item-img { width: 120px; height: 120px; background: var(--bg); border-radius: 16px; margin-right: 40px; display: flex; justify-content: center; align-items: center; color: #c1c6d6; font-size: 30px;}
        .item-details { flex: 1; }
        .item-name { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 8px 0; }
        .item-desc { color: var(--text-muted); font-size: 14px; margin: 0 0 20px 0; }
        .btn-remove { color: #d93025; text-decoration: none; font-size: 13px; font-weight: 500; }

        .item-actions { text-align: right; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end;}
        .qty-selector { display: flex; align-items: center; gap: 15px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #d2d2d7; background: none; color: var(--text-main); display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 16px;}
        .qty-btn:hover { border-color: var(--text-main); }
        .price { font-size: 20px; font-weight: 600; margin-top: 15px;}

        /* Totals */
        .summary-wrapper { display: flex; justify-content: flex-end; margin-top: 40px;}
        .summary { width: 100%; max-width: 400px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 15px; color: var(--text-muted);}
        .summary-total { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 30px; border-top: 1px solid rgba(0,0,0,0.08); font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-main);}

        .btn-checkout { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 999px; font-size: 17px; font-weight: 500; cursor: pointer; transition: 0.2s; margin-top: 30px; text-decoration: none; display: inline-block; text-align: center; box-sizing: border-box;}
        .btn-checkout:hover { background: #005bb5; }
    </style>
</head>
<body>

<div class="navbar">
    <a th:href="@{/}" class="logo" style="display: flex; align-items: center;">
        <img th:src="@{/img/logo.png}" alt="Quantum" style="height: 28px; width: auto;">
    </a>
    <a th:href="@{/}" style="color: var(--text-main);"><i class="fas fa-times"></i></a>
</div>

<div class="container">
    <h1>Review your bag.</h1>
    <p class="subtitle">Free delivery and free returns on all orders.</p>

    <div th:if="${#lists.isEmpty(cartItems)}" style="padding: 60px 0; text-align: center; color: var(--text-muted);">
        Your bag is empty.
    </div>

    <div class="cart-list" th:if="${!#lists.isEmpty(cartItems)}">
        <div th:each="item : ${cartItems}" class="cart-item">
            <div class="item-img" th:style="${item.produit.getPrimaryImage() != null} ? 'padding: 0; overflow: hidden;' : ''">
                <img th:if="${item.produit.getPrimaryImage() != null}" th:src="@{${item.produit.getPrimaryImage()}}" alt="" style="width: 100%; height: 100%; object-fit: cover;">
                <i th:unless="${item.produit.getPrimaryImage() != null}" class="fas fa-box"></i>
            </div>

            <div class="item-details">
                <h3 class="item-name" th:text="${item.produit.nom}">MacBook Air 15-inch</h3>
                <p class="item-desc" th:text="${item.produit.marque != null ? item.produit.marque.nom : 'Hardware'}">M3 Chip</p>
                <a th:href="@{'/cart/remove/' + ${item.produit.id}}" class="btn-remove">Remove</a>
            </div>

            <div class="item-actions">
                <div class="qty-selector">
                    <a th:href="@{'/cart/min-qty/' + ${item.produit.id}}" class="qty-btn">-</a>
                    <span style="font-weight: 500; font-size: 15px;" th:text="${item.quantite}">1</span>
                    <a th:href="@{'/cart/add-qty/' + ${item.produit.id}}" class="qty-btn">+</a>
                </div>
                <div class="price" th:text="'$' + ${item.totalPrice}"></div>
            </div>
        </div>
    </div>

    <div class="summary-wrapper" th:if="${!#lists.isEmpty(cartItems)}">
        <div class="summary">
            <div class="summary-row">
                <span>Subtotal</span>
                <span th:text="'$' + ${total}"></span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>FREE</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span th:text="'$' + ${total}"></span>
            </div>

            <a th:href="@{/checkout}" class="btn-checkout">Check Out</a>
        </div>
    </div>
</div>

</body>
</html>
