<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/img/dark.png}">
    <meta charset="UTF-8">
    <title>Reviews | Gérant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; min-height: 100vh; color: var(--text-main); }
        .sidebar { width: 240px; background: var(--bg); border-right: 1px solid rgba(0,0,0,0.04); padding: 30px 0; display: flex; flex-direction: column; flex-shrink: 0; }
        .brand { padding: 0 30px; margin-bottom: 40px; }
        .brand h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
        .brand span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 30px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-item.active { background: var(--surface); color: var(--text-main); font-weight: 600; border-radius: 0 999px 999px 0; margin-right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .nav-item i { width: 20px; font-size: 16px; }
        .nav-item:hover:not(.active) { color: var(--text-main); }
        .bottom-nav { margin-top: auto; }

        .main { flex: 1; padding: 40px 6%; overflow-y: auto; background: var(--surface); }
        .page-title { font-size: 36px; font-weight: 700; letter-spacing: -0.03em; margin: 0 0 6px; }
        .page-sub { color: var(--text-muted); font-size: 15px; margin: 0 0 36px; }

        .reviews-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; }
        .review-card { background: var(--bg); border-radius: 18px; padding: 22px; }
        .review-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .reviewer { font-size: 14px; font-weight: 700; }
        .product-tag { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 6px; }
        .stars { color: #f5c518; font-size: 12px; }
        .review-text { color: var(--text-muted); font-size: 14px; line-height: 1.55; margin: 10px 0 0; }
        .star-badge { background: #1a1c1d; color: #fff; font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 8px; display: inline-flex; align-items: center; gap: 4px; }

        .empty { text-align: center; color: var(--text-muted); padding: 60px 20px; }
        .empty i { font-size: 2.5rem; color: #c1c6d6; display: block; margin-bottom: 12px; }
    </style>
</head>
<body>
<div th:replace="~{fragments/gerant_sidebar :: gerantSidebar('avis')}"></div>

<div class="main">
    <h1 class="page-title">Reviews</h1>
    <p class="page-sub">Monitor customer feedback across all products.</p>

    <div th:if="${#lists.isEmpty(avisList)}" class="empty">
        <i class="fas fa-comment-alt"></i>
        No reviews yet.
    </div>

    <div class="reviews-grid" th:if="${!#lists.isEmpty(avisList)}">
        <div th:each="a : ${avisList}" class="review-card">
            <div class="product-tag" th:text="${a.produit != null ? a.produit.nom : 'Unknown product'}"></div>
            <div class="review-header">
                <div>
                    <div class="reviewer" th:text="${a.clientNom}"></div>
                    <div class="stars">
                        <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                            <i th:class="${i <= a.note ? 'fas fa-star' : 'far fa-star'}"></i>
                        </th:block>
                    </div>
                </div>
                <span class="star-badge"><i class="fas fa-star" style="font-size:10px;color:#f5c518;"></i> <span th:text="${a.note} + '/5'"></span></span>
            </div>
            <p class="review-text" th:text="${a.commentaire}"></p>
        </div>
    </div>
</div>
</body>
</html>
