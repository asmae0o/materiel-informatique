<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="icon" type="image/png" th:href="@{/img/dark.png}">
    <meta charset="UTF-8">
    <title>Categories | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; --primary: #1a1c1d; }
        body { font-family: 'Inter', sans-serif; background-color: var(--surface); color: var(--text-main); margin: 0; display: flex; height: 100vh; }

        .sidebar { width: 240px; background: var(--bg); border-right: 1px solid rgba(0,0,0,0.04); padding: 30px 0; display: flex; flex-direction: column; }
        .brand { padding: 0 30px; margin-bottom: 40px; }
        .brand h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
        .brand span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 30px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-item.active { background: var(--surface); color: var(--text-main); font-weight: 600; border-radius: 0 999px 999px 0; margin-right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .nav-item i { width: 20px; font-size: 16px; }
        .nav-item:hover:not(.active) { color: var(--text-main); }
        .bottom-nav { margin-top: auto; }

        .main { flex: 1; padding: 40px 6%; overflow-y: auto; background: var(--surface); }
        .content-area { width: 100%; }
        .main-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .main-header h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.04em; margin: 0 0 10px 0; }
        .main-header p { color: var(--text-muted); font-size: 16px; margin: 0; }

        .btn-primary { background: var(--primary); color: white; padding: 12px 24px; border-radius: 999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary:hover { background: #000; }
        .btn-cancel { background: var(--bg); color: var(--text-main); padding: 12px 24px; border-radius: 999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); font-size: 15px; outline: none; font-family: inherit; background: var(--bg); box-sizing: border-box; }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,28,29,0.08); background: #fff; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9999; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 24px; padding: 40px; width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .modal h2 { margin: 0 0 24px 0; font-size: 20px; font-weight: 700; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: #e5e5ea; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 15px 10px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.08); }
        th:nth-child(1) { width: 120px; }
        th:nth-child(3) { width: 120px; }
        td { padding: 20px 10px; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 15px; font-weight: 500; color: var(--text-main); }
        .actions-cell { display: flex; align-items: center; gap: 8px; }
        .btn-action { color: #9ca3af; background: transparent; border: none; cursor: pointer; font-size: 15px; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; text-decoration: none; padding: 0; outline: none; }
        .btn-action:hover { background: #f3f4f6; color: #4b5563; }
        .btn-delete-action { color: #9ca3af; background: transparent; border: none; cursor: pointer; font-size: 15px; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; padding: 0; outline: none; text-decoration: none; }
        .btn-delete-action:hover { background: #fee2e2; color: #ef4444; }
        .modal-delete { width: 400px; padding: 40px 32px; text-align: center; }
        .modal-delete .icon-warning { background: #fee2e2; color: #ef4444; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 20px auto; }
        .modal-delete h2 { font-size: 18px; margin-bottom: 12px; }
        .modal-delete p { color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-bottom: 28px; }
        .btn-delete-confirm { flex: 1; background: #ef4444; color: white; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-delete-confirm:hover { background: #dc2626; }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); display: flex; padding: 16px 20px; align-items: flex-start; gap: 12px; min-width: 300px; position: relative; overflow: hidden; pointer-events: auto; animation: toastSlideIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) forwards; border: 1px solid rgba(0,0,0,0.05); }
        .toast.closing { animation: toastSlideOut 0.3s ease forwards; }
        .toast-icon { color: #10b981; font-size: 20px; margin-top: 2px; }
        .toast-content { flex: 1; }
        .toast-title { font-size: 15px; font-weight: 600; color: #111827; margin: 0 0 4px 0; display: block; }
        .toast-msg { font-size: 13px; color: #6b7280; margin: 0; }
        .toast-close { color: #d1d5db; cursor: pointer; font-size: 14px; background: none; border: none; padding: 4px; display: flex; transition: color 0.2s; margin-top: 2px; }
        .toast-close:hover { color: #6b7280; }
        .toast-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: #34d399; width: 100%; transform-origin: left; animation: toastProgress 3s linear forwards; }
        @keyframes toastSlideIn { from { opacity: 0; transform: translateX(40px) scale(0.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes toastSlideOut { from { opacity: 1; transform: translateX(0) scale(1); } to { opacity: 0; transform: translateX(40px) scale(0.95); } }
        @keyframes toastProgress { from { transform: scaleX(1); } to { transform: scaleX(0); } }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin_sidebar :: adminSidebar('categories')}"></div>

<div class="main">
    <div class="content-area">
        <div class="main-header">
            <div>
                <h1>Category Management</h1>
                <p>Organize your products into collections.</p>
            </div>
            <button class="btn-primary" onclick="openAdd()"><i class="fas fa-plus"></i> Add Category</button>
        </div>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cat : ${categories}" th:attr="data-cat-id=${cat.id}">
                <td th:text="'#CAT-' + ${cat.id}" style="color: var(--text-muted); font-weight: 400;"></td>
                <td th:text="${cat.nom}"></td>
                <td>
                    <div class="actions-cell">
                        <button type="button" class="btn-action" title="Edit"
                                th:attr="onclick=|openEdit(${cat.id}, '${cat.nom}')|">
                            <i class="far fa-edit"></i>
                        </button>
                        <button type="button" class="btn-delete-action" title="Delete"
                                th:attr="onclick=|openDeleteModal(${cat.id}, '${cat.nom}')|">
                            <i class="far fa-trash-alt"></i>
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal" onclick="if(event.target===this)closeDelete()">
    <div class="modal modal-delete">
        <div class="icon-warning"><i class="fas fa-trash-alt"></i></div>
        <h2>Delete Category</h2>
        <p id="deleteModalText"></p>
        <form onsubmit="confirmDelete(event)">
            <div class="modal-actions" style="justify-content:center;">
                <button type="button" class="btn-cancel" onclick="closeDelete()">Cancel</button>
                <button type="submit" class="btn-delete-confirm" id="deleteSubmitBtn">Delete</button>
            </div>
        </form>
    </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAdd()">
    <div class="modal">
        <button class="modal-close" onclick="closeAdd()"><i class="fas fa-times"></i></button>
        <h2>Add Category</h2>
        <form id="addCatForm" th:action="@{/admin/categories/save}" method="post" onsubmit="submitAddCat(event)">
            <div class="form-group">
                <label>Category Name</label>
                <input type="text" name="nom" id="addInput" class="form-input" placeholder="E.g., Peripherals, Components..." required>
            </div>
            <div class="modal-actions">
                <button type="submit" class="btn-primary" style="flex:1; justify-content:center;">Add Category</button>
                <button type="button" class="btn-cancel" onclick="closeAdd()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeEdit()">
    <div class="modal">
        <button class="modal-close" onclick="closeEdit()"><i class="fas fa-times"></i></button>
        <h2>Edit Category</h2>
        <form id="editCatForm" th:action="@{/admin/categories/update}" method="post" onsubmit="submitEditCat(event)">
            <input type="hidden" name="id" id="editId">
            <div class="form-group">
                <label>Category Name</label>
                <input type="text" name="nom" id="editInput" class="form-input" required>
            </div>
            <div class="modal-actions">
                <button type="submit" class="btn-primary" style="flex:1; justify-content:center;">Save Changes</button>
                <button type="button" class="btn-cancel" onclick="closeEdit()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
    function formToParams(form) { return new URLSearchParams(new FormData(form)).toString(); }

    async function submitAddCat(e) {
        e.preventDefault();
        const form = document.getElementById('addCatForm');
        const btn = form.querySelector('[type="submit"]');
        const nom = document.getElementById('addInput').value;
        btn.disabled = true; btn.textContent = 'Adding...';
        try {
            const res = await fetch(form.action, { method: 'POST', body: formToParams(form), credentials: 'same-origin', headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
            if (res.ok || res.redirected) {
                closeAdd();
                form.reset();
                showToast('Category added', `"${nom}" has been created successfully.`);
                setTimeout(() => window.location.reload(), 1500);
            } else { alert('Error adding category.'); }
        } catch { alert('Network error.'); }
        btn.disabled = false; btn.textContent = 'Add Category';
    }

    async function submitEditCat(e) {
        e.preventDefault();
        const form = document.getElementById('editCatForm');
        const btn = form.querySelector('[type="submit"]');
        const nom = document.getElementById('editInput').value;
        btn.disabled = true; btn.textContent = 'Saving...';
        try {
            const res = await fetch(form.action, { method: 'POST', body: formToParams(form), credentials: 'same-origin', headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
            if (res.ok || res.redirected) {
                closeEdit();
                showToast('Category updated', `"${nom}" has been saved successfully.`);
                setTimeout(() => window.location.reload(), 1500);
            } else { alert('Error updating category.'); }
        } catch { alert('Network error.'); }
        btn.disabled = false; btn.textContent = 'Save Changes';
    }

    function openAdd() { document.getElementById('addModal').classList.add('open'); document.getElementById('addInput').focus(); }
    function closeAdd() { document.getElementById('addModal').classList.remove('open'); }

    function openEdit(id, nom) {
        document.getElementById('editId').value = id;
        document.getElementById('editInput').value = nom;
        document.getElementById('editModal').classList.add('open');
        document.getElementById('editInput').focus();
    }
    function closeEdit() { document.getElementById('editModal').classList.remove('open'); }

    let deleteCatId = null, deleteCatRow = null;
    function openDeleteModal(id, nom) {
        deleteCatId = id;
        deleteCatRow = document.querySelector(`[data-cat-id="${id}"]`);
        document.getElementById('deleteModalText').innerHTML = `Are you sure you want to delete "<strong>${nom}</strong>"? This action is irreversible.`;
        document.getElementById('deleteModal').classList.add('open');
    }
    function closeDelete() { document.getElementById('deleteModal').classList.remove('open'); }

    async function confirmDelete(e) {
        e.preventDefault();
        const btn = document.getElementById('deleteSubmitBtn');
        btn.disabled = true; btn.textContent = 'Deleting...';
        try {
            const res = await fetch('/admin/categories/delete/' + deleteCatId, { credentials: 'same-origin' });
            if (res.ok || res.redirected) {
                closeDelete();
                const nom = document.getElementById('deleteModalText').querySelector('strong').textContent;
                showToast('Category deleted', `"${nom}" has been removed.`);
                if (deleteCatRow) deleteCatRow.remove();
            } else {
                alert('Error deleting category.');
            }
        } catch { alert('Network error.'); }
        btn.disabled = false; btn.textContent = 'Delete';
    }

    function showToast(title, message) {
        let container = document.getElementById('toastWrapper');
        if (!container) { container = document.createElement('div'); container.id = 'toastWrapper'; container.className = 'toast-container'; document.body.appendChild(container); }
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `
            <div class="toast-icon"><i class="far fa-check-circle"></i></div>
            <div class="toast-content"><strong class="toast-title">${title}</strong><p class="toast-msg">${message}</p></div>
            <button class="toast-close" onclick="this.closest('.toast').classList.add('closing');setTimeout(()=>this.closest('.toast').remove(),300)"><i class="fas fa-times"></i></button>
            <div class="toast-progress"></div>`;
        container.appendChild(toast);
        setTimeout(() => { if (toast.parentElement) { toast.classList.add('closing'); setTimeout(() => toast.remove(), 300); } }, 3000);
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeAdd(); closeEdit(); closeDelete(); } });
</script>
</body>
</html>
