<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="icon" type="image/png" th:href="@{/img/dark.png}">
    <meta charset="UTF-8">
    <title>Categories | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; --primary: #0071e3; }
        body { font-family: 'Inter', sans-serif; background-color: var(--surface); color: var(--text-main); margin: 0; display: flex; height: 100vh;}

        /* Sidebar */
        .sidebar { width: 240px; background: var(--bg); border-right: 1px solid rgba(0,0,0,0.04); padding: 30px 0; display: flex; flex-direction: column;}
        .brand { padding: 0 30px; margin-bottom: 40px;}
        .brand h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em;}
        .brand span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;}

        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 30px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500;}
        .nav-item.active { background: var(--surface); color: var(--text-main); font-weight: 600; border-radius: 0 999px 999px 0; margin-right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);}
        .nav-item i { width: 20px; font-size: 16px;}
        .nav-item:hover:not(.active) { color: var(--text-main); }
        .bottom-nav { margin-top: auto; }

        /* Main Content */
        .main { flex: 1; padding: 0; overflow-y: auto; background: var(--surface);}
        .topbar { display: flex; justify-content: space-between; padding: 20px 60px; border-bottom: 1px solid rgba(0,0,0,0.04);}
        .content-area { padding: 40px 60px; max-width: 1000px;}

        .main-header { margin-bottom: 40px;}
        .main-header h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.04em; margin: 0 0 10px 0;}
        .main-header p { color: var(--text-muted); font-size: 16px; margin: 0; max-width: 600px;}

        /* Formulaire */
        .action-card { background: var(--bg); padding: 30px; border-radius: 20px; margin-bottom: 40px; border: 1px solid rgba(0,0,0,0.02);}
        .action-card h3 { margin: 0 0 20px 0; font-size: 18px;}
        .form-row { display: flex; gap: 15px; }
        .form-input { flex: 1; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08); font-size: 15px; outline: none; font-family: inherit;}
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1); }
        .btn-primary { background: var(--primary); color: white; padding: 14px 30px; border-radius: 999px; text-decoration: none; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: 0.2s;}

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 15px 10px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.08);}
        td { padding: 20px 10px; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 15px; font-weight: 500; color: var(--text-main);}
        .actions-cell { display: flex; align-items: center; gap: 8px; }
        .btn-action { color: #9ca3af; background: transparent; border: none; cursor: pointer; font-size: 15px; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; text-decoration: none; padding: 0; outline: none; }
        .btn-action:hover { background: #f3f4f6; color: #4b5563; }
        .btn-delete-action { color: #9ca3af; background: transparent; border: none; cursor: pointer; font-size: 15px; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; padding: 0; outline: none; text-decoration: none; }
        .btn-delete-action:hover { background: #fee2e2; color: #ef4444; }
        .edit-card { background: #fff3cd; padding: 20px 30px; border-radius: 16px; margin-bottom: 30px; border: 1px solid #ffc107; }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin_sidebar :: adminSidebar('categories')}"></div>

<div class="main">


    <div class="content-area">
        <div class="main-header">
            <h1>Category Management</h1>
            <p>Organize your products into collections.</p>
        </div>

        <!-- Edit form shown when editing -->
        <div class="edit-card" th:if="${editCategorie != null}">
            <h3 style="margin-top:0;">✏️ Modifier la Catégorie</h3>
            <form th:action="@{/admin/categories/update}" method="post" class="form-row">
                <input type="hidden" name="id" th:value="${editCategorie.id}">
                <input type="text" name="nom" th:value="${editCategorie.nom}" required class="form-input">
                <button type="submit" class="btn-primary">Enregistrer</button>
                <a th:href="@{/admin/categories}" style="padding: 14px 20px; color: var(--text-muted); text-decoration: none; font-size: 14px;">Annuler</a>
            </form>
        </div>

        <div class="action-card" th:if="${editCategorie == null}">
            <h3>Create New Category</h3>
            <form th:action="@{/admin/categories/save}" method="post" class="form-row">
                <input type="text" name="nom" placeholder="E.g., Peripherals, Components..." required class="form-input">
                <button type="submit" class="btn-primary">Add Category</button>
            </form>
        </div>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th style="color: #8fa0b5; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;">ACTIONS</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cat : ${categories}">
                <td th:text="'#CAT-' + ${cat.id}" style="color: var(--text-muted); font-weight: 400;"></td>
                <td th:text="${cat.nom}"></td>
                <td>
                    <div class="actions-cell">
                        <a th:href="@{'/admin/categories/edit/' + ${cat.id}}" class="btn-action" title="Edit Category"><i class="far fa-edit"></i></a>
                        <a th:href="@{'/admin/categories/delete/' + ${cat.id}}" class="btn-delete-action" onclick="return confirm('Supprimer cette catégorie ?')" title="Delete Category"><i class="far fa-trash-alt"></i></a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
