<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscription | MyHardware</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; --primary: #0071e3; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 24px; box-sizing: border-box; }

        .logo-icon { background: var(--surface); color: var(--primary); width: 48px; height: 48px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 4px 14px rgba(26,28,29,0.04); margin-bottom: 20px; }
        h1 { color: var(--text-main); font-size: 32px; font-weight: 700; letter-spacing: -0.04em; margin: 0 0 10px 0; text-align: center; }
        p.subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 32px; text-align: center; }

        .signup-card { background: var(--surface); padding: 32px; border-radius: 24px; width: 100%; max-width: 420px; box-shadow: 0 4px 20px rgba(26,28,29,0.03); box-sizing: border-box; }
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        input { width: 100%; padding: 14px 16px; background: var(--bg); border: 1px solid transparent; border-radius: 12px; font-size: 15px; color: var(--text-main); font-family: inherit; outline: none; transition: 0.2s; box-sizing: border-box; }
        input:focus { border-color: rgba(0, 113, 227, 0.3); box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1); background: var(--surface); }

        .btn-signup { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 999px; font-size: 15px; font-weight: 500; cursor: pointer; transition: 0.2s; margin-top: 8px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-signup:hover { background: #005bb5; }

        .alert-error { color: #d93025; font-size: 14px; margin-bottom: 16px; text-align: center; background: #fff2f2; padding: 10px; border-radius: 8px; }
        .auth-link { margin-top: 16px; text-align: center; font-size: 14px; color: var(--text-muted); }
        .auth-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .auth-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="logo-icon"><i class="fas fa-user-plus"></i></div>
<h1>Créer votre compte</h1>
<p class="subtitle">Inscription client rapide sur MyHardware.</p>

<div class="signup-card">
    <div th:if="${signupError}" class="alert-error" th:text="${signupError}"></div>

    <form th:action="@{/signup}" method="post">
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" placeholder="Choisissez un identifiant" required autofocus>
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" placeholder="Minimum recommande: 8 caracteres" required>
        </div>

        <div class="form-group">
            <label>Confirmer le mot de passe</label>
            <input type="password" name="confirmPassword" placeholder="Retapez votre mot de passe" required>
        </div>

        <button type="submit" class="btn-signup">Créer le compte <i class="fas fa-arrow-right" style="font-size: 12px;"></i></button>
    </form>

    <p class="auth-link">Déjà inscrit ? <a th:href="@{/login}">Se connecter</a></p>
</div>
</body>
</html>
