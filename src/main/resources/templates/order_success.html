<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Commande Confirmée</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f5f5f7; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 60px; border-radius: 30px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .icon { font-size: 4rem; color: #34c759; margin-bottom: 20px; }
        h1 { font-weight: 800; color: #1d1d1f; }
        .btn-home { background: #0071e3; color: white; padding: 15px 30px; border-radius: 12px; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 30px; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">✅</div>
    <h1>Commande Confirmée !</h1>
    <p>Merci pour votre achat. Votre colis est en cours de préparation.</p>
    <a th:href="@{/}" class="btn-home">Retour à l'accueil</a>
</div>
</body>
</html>
