<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin | Toutes les Commandes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f5f5f7; font-family: 'Inter', sans-serif; padding: 40px 10%; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #86868b; font-weight: 600; }
        .btn-back { color: #0071e3; text-decoration: none; font-weight: 600; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-livre { background: #d4edda; color: #155724; }
        .status-cours { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
<a th:href="@{/admin/dashboard}" class="btn-back">← Retour au Centre de Contrôle</a>

<h1 style="margin-top: 20px;">📦 Vue Globale des Commandes</h1>

<div class="container">
    <table>
        <thead>
        <tr>
            <th>Réf. Commande</th>
            <th>Client</th>
            <th>Montant Total</th>
            <th>Date</th>
            <th>Statut</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>#CMD-2026-001</td>
            <td>Client Test 1</td>
            <td>25000 MAD</td>
            <td>18 Avr 2026</td>
            <td><span class="status status-livre">LIVRÉE</span></td>
        </tr>
        <tr>
            <td>#CMD-2026-002</td>
            <td>Client Test 2</td>
            <td>350 MAD</td>
            <td>18 Avr 2026</td>
            <td><span class="status status-cours">EN COURS</span></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
