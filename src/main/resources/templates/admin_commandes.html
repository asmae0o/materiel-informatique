<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/img/dark.png}">
    <meta charset="UTF-8">
    <title>Admin | Toutes les Commandes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--bg); border-right: 1px solid rgba(0,0,0,0.04); padding: 30px 0; display: flex; flex-direction: column; }
        .brand { padding: 0 30px; margin-bottom: 40px; }
        .brand h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
        .brand span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 30px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-item.active { background: var(--surface); color: var(--text-main); font-weight: 600; border-radius: 0 999px 999px 0; margin-right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .nav-item i { width: 20px; font-size: 16px; }
        .nav-item:hover:not(.active) { color: var(--text-main); }
        .bottom-nav { margin-top: auto; }
        .main { flex: 1; padding: 40px 6%; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #86868b; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        .status-select { padding: 6px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; border: none; cursor: pointer; outline: none; font-family: inherit; }
        .empty-state { text-align: center; color: #888; padding: 40px; }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin_sidebar :: adminSidebar('commandes')}"></div>

<div class="main">

<div class="main-header" style="margin-bottom: 40px; margin-top: 10px;">
    <h1 style="font-size: 40px; font-weight: 700; letter-spacing: -0.04em; margin: 0 0 10px 0;">Orders Management</h1>
    <p style="color: var(--text-muted); font-size: 16px; margin: 0; max-width: 600px;">Review customer purchases, track shipping, and manage fulfillment statuses.</p>
</div>

<div class="container">
    <div th:if="${#lists.isEmpty(commandes)}" class="empty-state">
        <i class="fas fa-box-open" style="font-size: 2.5rem; color: #ccc; display: block; margin-bottom: 15px;"></i>
        Aucune commande pour le moment.
    </div>
    <table th:if="${!#lists.isEmpty(commandes)}">
        <thead>
        <tr>
            <th>Réf. Commande</th>
            <th>Client</th>
            <th>Montant Total</th>
            <th>Date</th>
            <th>Adresse</th>
            <th>Paiement</th>
            <th>Statut</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cmd : ${commandes}">
            <td th:text="${cmd.numero}" style="font-weight: 600;"></td>
            <td th:text="${cmd.clientNom}"></td>
            <td th:text="${#numbers.formatDecimal(cmd.total, 1, 2)} + ' MAD'" style="font-weight: 600;"></td>
            <td th:text="${cmd.dateCommande}"></td>
            <td th:text="${cmd.adresseLivraison}" style="color: #5e5e63; font-size: 13px;"></td>
            <td th:text="${cmd.methodePaiement}" style="color: #5e5e63; font-size: 13px;"></td>
            <td>
                <form th:action="@{'/admin/commandes/statut/' + ${cmd.id}}" method="post" style="margin:0;">
                    <select name="statut" class="status-select" onchange="this.form.submit()"
                            th:style="${cmd.statut == 'Livrée'} ? 'background:#d4edda;color:#155724;' :
                                      (${cmd.statut == 'Annulée'} ? 'background:#f8d7da;color:#721c24;' :
                                       'background:#fff3cd;color:#856404;')">
                        <option value="En cours de préparation" th:selected="${cmd.statut == 'En cours de préparation'}">En cours</option>
                        <option value="Expédiée" th:selected="${cmd.statut == 'Expédiée'}">Expédiée</option>
                        <option value="Livrée" th:selected="${cmd.statut == 'Livrée'}">Livrée</option>
                        <option value="Annulée" th:selected="${cmd.statut == 'Annulée'}">Annulée</option>
                    </select>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</div>
</body>
</html>
