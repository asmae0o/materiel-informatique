<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin | Modération Avis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f9f9fb; --surface: #ffffff; --text-main: #1a1c1d; --text-muted: #5e5e63; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--bg); border-right: 1px solid rgba(0,0,0,0.04); padding: 30px 0; display: flex; flex-direction: column; }
        .brand { padding: 0 30px; margin-bottom: 40px; }
        .brand h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
        .brand span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 30px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-item.active { background: var(--surface); color: var(--text-main); font-weight: 600; border-radius: 0 999px 999px 0; margin-right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .nav-item i { width: 20px; font-size: 16px; }
        .nav-item:hover:not(.active) { color: var(--text-main); }
        .bottom-nav { margin-top: auto; }
        .main { flex: 1; padding: 40px 6%; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-top: 30px; }
        .avis-card { padding: 20px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: #ff3b30; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; text-decoration: none; transition: 0.3s; }
        .btn-delete:hover { background: #d70015; }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin_sidebar :: adminSidebar('avis')}"></div>

<div class="main">

<h1 style="margin-top: 20px;">💬 Modération des Avis</h1>
<p style="color: #666;">Consultez et supprimez les avis inappropriés laissés par les clients.</p>

<div class="container">
    <div th:each="a : ${avisList}" class="avis-card">
        <div>
            <strong th:text="'Produit: ' + (${a.produit != null ? a.produit.nom : 'Produit inconnu'})">Produit</strong>
            <span style="color: #f5c518; margin-left: 10px;" th:text="${a.note} + '/5 ★'"></span>

            <p style="margin: 8px 0 0 0; color: #333; font-size: 1.05rem;">
                "<span th:text="${a.commentaire}"></span>"
            </p>
            <p style="margin: 5px 0 0 0; color: #888; font-size: 0.9rem;">
                - Rédigé par <em th:text="${a.clientNom}"></em>
            </p>
        </div>

        <a th:href="@{'/admin/avis/delete/' + ${a.id}}"
           class="btn-delete"
           onclick="return confirm('Supprimer définitivement cet avis ?')">
            <i class="fas fa-trash"></i> Supprimer
        </a>
    </div>

    <div th:if="${#lists.isEmpty(avisList)}" style="text-align: center; color: #888; padding: 20px;">
        <i class="fas fa-check-circle" style="font-size: 2rem; color: #34c759; margin-bottom: 10px;"></i>
        <p>Aucun avis à modérer pour le moment.</p>
    </div>
</div>
</div>
</body>
</html>
