<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="storefrontHeader">
    <div class="storefront-header-spacer" aria-hidden="true"></div>
    <div class="navbar">
        <a th:href="@{/}" class="logo">The Gallery</a>

        <div class="nav-links">
            <a th:href="@{/}" class="active">Store</a>
        </div>

        <div class="nav-icons">
            <button type="button" sec:authorize="!hasAnyAuthority('GERANT', 'ADMIN', 'ROLE_GERANT', 'ROLE_ADMIN')" onclick="window.CartPanel.open()">
                <i class="fas fa-shopping-bag"></i>
            </button>

            <div sec:authorize="!isAuthenticated()"><a th:href="@{/login}"><i class="far fa-user-circle"></i></a></div>

            <div sec:authorize="isAuthenticated() and !hasAnyAuthority('GERANT', 'ADMIN', 'ROLE_GERANT', 'ROLE_ADMIN')">
                <a th:href="@{/compte}"><i class="fas fa-user-circle"></i></a>
            </div>

            <div sec:authorize="hasAnyAuthority('GERANT', 'ADMIN', 'ROLE_GERANT', 'ROLE_ADMIN')" style="display: flex; gap: 15px;">
                <a sec:authorize="hasAnyAuthority('GERANT', 'ROLE_GERANT')" th:href="@{/gerant/dashboard}" style="font-size: 14px; font-weight: 500; color: var(--primary);">Dashboard</a>
                <a sec:authorize="hasAnyAuthority('ADMIN', 'ROLE_ADMIN')" th:href="@{/admin/dashboard}" style="font-size: 14px; font-weight: 500; color: #f59e0b;">Admin</a>
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit"><i class="fas fa-sign-out-alt"></i></button>
                </form>
            </div>
        </div>
    </div>

    <div id="cart-overlay" class="cart-overlay" onclick="window.CartPanel.close()"></div>
    <aside id="cart-panel" class="cart-panel">
        <div id="cart-panel-content"></div>
    </aside>

    <style>
        .storefront-header-spacer {
            height: 60px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            height: 60px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            z-index: 1100;
            box-sizing: border-box;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: #1a1c1d;
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            color: #5e5e63;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-links a.active,
        .nav-links a:hover {
            color: #1a1c1d;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-icons a,
        .nav-icons button {
            color: #1a1c1d;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
        }

        .nav-icons i {
            display: inline-block;
            line-height: 1;
        }

        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.28);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1200;
        }

        .cart-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: min(420px, 92vw);
            height: 100vh;
            background: #ffffff;
            box-shadow: -12px 0 40px rgba(0, 0, 0, 0.12);
            transform: translateX(100%);
            transition: transform 0.22s ease;
            z-index: 1300;
            display: flex;
            flex-direction: column;
        }

        .cart-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .cart-panel.open {
            transform: translateX(0);
        }

        .cart-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 24px 22px 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .cart-panel-header h3 {
            margin: 0;
            font-size: 20px;
            letter-spacing: -0.02em;
        }

        .cart-panel-header span {
            color: #5e5e63;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .cart-panel-body {
            padding: 14px 22px;
            overflow-y: auto;
            flex: 1;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .cart-item-name {
            font-size: 14px;
            font-weight: 600;
            color: #1a1c1d;
            margin-bottom: 4px;
        }

        .cart-item-meta {
            font-size: 12px;
            color: #5e5e63;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-item-actions button {
            width: 28px;
            height: 28px;
            border-radius: 999px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            background: #fff;
            cursor: pointer;
            font-size: 13px;
        }

        .cart-item-actions button.remove {
            border-color: transparent;
            color: #d93025;
        }

        .cart-item-actions span {
            min-width: 18px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
        }

        .cart-panel-empty {
            padding: 56px 22px;
            text-align: center;
            color: #7a7a80;
        }

        .cart-panel-empty i {
            font-size: 24px;
            margin-bottom: 10px;
            color: #c1c6d6;
        }

        .cart-panel-footer {
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            padding: 16px 22px 22px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .checkout-btn {
            display: block;
            text-align: center;
            padding: 12px 16px;
            border-radius: 999px;
            background: #0071e3;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }

        .checkout-btn.disabled {
            pointer-events: none;
            opacity: 0.45;
        }
    </style>

    <script>
        window.CartPanel = window.CartPanel || {
            open: async function () {
                document.getElementById('cart-overlay').classList.add('open');
                document.getElementById('cart-panel').classList.add('open');
                await this.load();
            },
            close: function () {
                document.getElementById('cart-overlay').classList.remove('open');
                document.getElementById('cart-panel').classList.remove('open');
            },
            load: async function () {
                const res = await fetch('/cart/panel', { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                const html = await res.text();
                document.getElementById('cart-panel-content').innerHTML = html;
            },
            update: async function (action, id) {
                let endpoint = '/cart/remove/' + id + '?panel=true';
                if (action === 'add') endpoint = '/cart/add-qty/' + id + '?panel=true';
                if (action === 'min') endpoint = '/cart/min-qty/' + id + '?panel=true';

                const res = await fetch(endpoint, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                const html = await res.text();
                document.getElementById('cart-panel-content').innerHTML = html;
            }
        };
    </script>
</div>
</body>
</html>
