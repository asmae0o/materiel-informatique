<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="storefrontHeader">
    <div class="storefront-header-spacer" aria-hidden="true"></div>
    <div class="navbar">
        <a th:href="@{/}" class="logo" style="display: flex; align-items: center;">
            <img th:src="@{/img/logo.png}" alt="Quantum" style="height: 28px; width: auto;">
        </a>

        <div class="nav-links">
            <a th:href="@{/}" class="active">Accueil</a>
        </div>

        <div class="nav-icons">
            <button type="button" sec:authorize="!hasAnyAuthority('GERANT', 'ADMIN')" onclick="window.CartPanel.open()" style="position: relative;">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-badge" class="cart-badge"
                      th:text="${session.cart != null and !session.cart.isEmpty()} ? ${#aggregates.sum(session.cart.values().![quantite])} : ''"
                      th:style="${session.cart == null or session.cart.isEmpty()} ? 'display:none' : ''"></span>
            </button>

            <div sec:authorize="!isAuthenticated()">
                <button type="button" onclick="openModal('loginModal')" style="background:none;border:none;cursor:pointer;font-size:18px;color:#1a1c1d;padding:0;display:flex;align-items:center;">
                    <i class="far fa-user-circle"></i>
                </button>
            </div>

            <div sec:authorize="isAuthenticated() and !hasAnyAuthority('GERANT', 'ADMIN')">
                <a th:href="@{/compte}"><i class="fas fa-user-circle"></i></a>
            </div>

            <div sec:authorize="hasAnyAuthority('GERANT', 'ADMIN')" style="display: flex; gap: 15px;">
                <a sec:authorize="hasAuthority('GERANT')" th:href="@{/gerant/dashboard}" style="font-size: 14px; font-weight: 500; color: var(--primary);">Dashboard</a>
                <a sec:authorize="hasAuthority('ADMIN')" th:href="@{/admin/dashboard}" style="font-size: 14px; font-weight: 500; color: #f59e0b;">Admin</a>
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit"><i class="fas fa-sign-out-alt"></i></button>
                </form>
            </div>
        </div>
    </div>

    <div id="cart-overlay" class="cart-overlay" onclick="window.CartPanel.close()"></div>
    <aside id="cart-panel" class="cart-panel">
        <div id="cart-panel-content"></div>
    </aside>

    <style>
        .storefront-header-spacer {
            height: 90px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 64px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 999px;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1400px;
            z-index: 1100;
            box-sizing: border-box;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: #1a1c1d;
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            color: #5e5e63;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-links a.active,
        .nav-links a:hover {
            color: #1a1c1d;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-icons a,
        .nav-icons button {
            color: #1a1c1d;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
        }

        .nav-icons i {
            display: inline-block;
            line-height: 1;
        }

        .cart-badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #e30000;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            min-width: 10px;
            height: 18px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
            box-sizing: content-box;
            padding: 0 4px;
        }

        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.28);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1200;
        }

        .cart-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: min(420px, 92vw);
            height: 100vh;
            background: #ffffff;
            box-shadow: -12px 0 40px rgba(0, 0, 0, 0.12);
            transform: translateX(100%);
            transition: transform 0.22s ease;
            z-index: 1300;
            display: flex;
            flex-direction: column;
        }

        .cart-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .cart-panel.open {
            transform: translateX(0);
        }

        .cart-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 24px 22px 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .cart-panel-header h3 {
            margin: 0;
            font-size: 20px;
            letter-spacing: -0.02em;
        }

        .cart-panel-header span {
            color: #5e5e63;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .cart-panel-body {
            padding: 14px 22px;
            overflow-y: auto;
            flex: 1;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .cart-item-name {
            font-size: 14px;
            font-weight: 600;
            color: #1a1c1d;
            margin-bottom: 4px;
        }

        .cart-item-meta {
            font-size: 12px;
            color: #5e5e63;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-item-actions button {
            width: 28px;
            height: 28px;
            border-radius: 999px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            background: #fff;
            cursor: pointer;
            font-size: 13px;
        }

        .cart-item-actions button.remove {
            border-color: transparent;
            color: #d93025;
            transition: all 0.2s ease;
        }
        
        .cart-item-actions button.remove:hover {
            background-color: #fee2e2;
            color: #b91c1c;
        }

        .cart-item-actions span {
            min-width: 18px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
        }

        .cart-panel-empty {
            padding: 56px 22px;
            text-align: center;
            color: #7a7a80;
        }

        .cart-panel-empty i {
            font-size: 24px;
            margin-bottom: 10px;
            color: #c1c6d6;
        }

        .cart-panel-footer {
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            padding: 16px 22px 22px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .checkout-btn {
            display: block;
            text-align: center;
            padding: 12px 16px;
            border-radius: 999px;
            background: #1a1c1d;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        .checkout-btn.disabled {
            pointer-events: none;
            opacity: 0.45;
        }

        /* Auth Modals */
        .auth-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9999; justify-content: center; align-items: center; }
        .auth-overlay.open { display: flex; }
        .auth-modal { background: #fff; border-radius: 24px; padding: 40px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative; animation: authSlideUp 0.2s ease; max-height: 90vh; overflow-y: auto; }
        @keyframes authSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .auth-modal h2 { margin: 0 0 6px 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
        .auth-modal .subtitle { color: #5e5e63; font-size: 14px; margin: 0 0 28px 0; }
        .auth-close { position: absolute; top: 18px; right: 18px; background: #f5f5f7; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 15px; color: #5e5e63; display: flex; align-items: center; justify-content: center; }
        .auth-close:hover { background: #e5e5ea; }
        .auth-group { margin-bottom: 14px; }
        .auth-group label { display: block; font-size: 11px; font-weight: 600; color: #5e5e63; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
        .auth-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e0e0e5; outline: none; font-family: inherit; font-size: 14px; box-sizing: border-box; transition: border-color 0.2s; background: #f9f9fb; }
        .auth-input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,0.1); background: #fff; }
        .auth-btn { width: 100%; padding: 14px; background: #1a1c1d; color: white; border: none; border-radius: 999px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; transition: 0.2s; }
        .auth-btn:hover { background: #000; }
        .auth-switch { text-align: center; margin-top: 20px; font-size: 14px; color: #5e5e63; }
        .auth-switch a { color: #0071e3; text-decoration: none; font-weight: 600; cursor: pointer; }
        .auth-switch a:hover { text-decoration: underline; }
        .auth-error { background: #fff0f0; color: #d93025; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; }
    </style>

    <!-- Login Modal -->
    <div class="auth-overlay" id="loginModal" onclick="closeOnAuthOverlay(event,'loginModal')">
        <div class="auth-modal">
            <button class="auth-close" onclick="closeModal('loginModal')"><i class="fas fa-times"></i></button>
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your Quantum account</p>
            <div class="auth-error" th:if="${param.loginError != null}">Identifiants incorrects. Réessayez.</div>
            <form th:action="@{/login}" method="post" id="loginForm">
                <input type="hidden" name="redirectTo" id="loginRedirectTo" value="">
                <div class="auth-group">
                    <label>Username or Email</label>
                    <input type="text" name="username" class="auth-input" placeholder="your username or email" required autofocus>
                </div>
                <div class="auth-group">
                    <label>Password</label>
                    <div style="position:relative;">
                        <input type="password" name="password" id="loginPassword" class="auth-input" placeholder="••••••••" required style="padding-right:44px;">
                        <button type="button" onclick="togglePwd('loginPassword','loginEye')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#5e5e63;font-size:16px;padding:0;">
                            <i id="loginEye" class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="auth-btn" id="loginSubmitBtn">
                    <span id="loginBtnText">Sign In</span>
                    <span id="loginBtnSpinner" style="display:none;"><i class="fas fa-circle-notch fa-spin"></i></span>
                </button>
            </form>
            <p class="auth-switch">No account? <a onclick="switchModal('loginModal','signupModal')">Create one</a></p>
        </div>
    </div>

    <!-- Signup Modal -->
    <div class="auth-overlay" id="signupModal" onclick="closeOnAuthOverlay(event,'signupModal')">
        <div class="auth-modal">
            <button class="auth-close" onclick="closeModal('signupModal')"><i class="fas fa-times"></i></button>
            <h2>Create account</h2>
            <p class="subtitle">Join Quantum today</p>
            <div class="auth-error" th:if="${signupError}" th:text="${signupError}"></div>
            <form th:action="@{/signup}" method="post" id="signupForm">
                <div class="auth-group">
                    <label>Full Name</label>
                    <input type="text" name="nom" class="auth-input" placeholder="Your name" required>
                </div>
                <div class="auth-group">
                    <label>Username</label>
                    <input type="text" name="username" class="auth-input" placeholder="Choose a username" required>
                </div>
                <div class="auth-group">
                    <label>Email</label>
                    <input type="email" name="email" class="auth-input" placeholder="your@email.com">
                </div>
                <div class="auth-group">
                    <label>Phone</label>
                    <input type="tel" name="telephone" class="auth-input" placeholder="06 12 34 56 78">
                </div>
                <div class="auth-group">
                    <label>Password</label>
                    <div style="position:relative;">
                        <input type="password" name="password" id="signupPassword" class="auth-input" placeholder="••••••••" required style="padding-right:44px;">
                        <button type="button" onclick="togglePwd('signupPassword','signupEye')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#5e5e63;font-size:16px;padding:0;">
                            <i id="signupEye" class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="auth-group">
                    <label>Confirm Password</label>
                    <div style="position:relative;">
                        <input type="password" name="confirmPassword" id="signupConfirm" class="auth-input" placeholder="••••••••" required style="padding-right:44px;">
                        <button type="button" onclick="togglePwd('signupConfirm','signupConfirmEye')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#5e5e63;font-size:16px;padding:0;">
                            <i id="signupConfirmEye" class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="auth-btn" id="signupSubmitBtn">
                    <span id="signupBtnText">Create Account</span>
                    <span id="signupBtnSpinner" style="display:none;"><i class="fas fa-circle-notch fa-spin"></i></span>
                </button>
            </form>
            <p class="auth-switch">Already have an account? <a onclick="switchModal('signupModal','loginModal')">Sign in</a></p>
        </div>
    </div>

    <script>
        window.CartPanel = window.CartPanel || {
            open: async function () {
                document.getElementById('cart-overlay').classList.add('open');
                document.getElementById('cart-panel').classList.add('open');
                await this.load();
            },
            close: function () {
                document.getElementById('cart-overlay').classList.remove('open');
                document.getElementById('cart-panel').classList.remove('open');
            },
            load: async function () {
                const res = await fetch('/cart/panel', { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                const html = await res.text();
                document.getElementById('cart-panel-content').innerHTML = html;
            },
            update: async function (action, id) {
                let endpoint = '/cart/remove/' + id + '?panel=true';
                if (action === 'add') endpoint = '/cart/add-qty/' + id + '?panel=true';
                if (action === 'min') endpoint = '/cart/min-qty/' + id + '?panel=true';

                const res = await fetch(endpoint, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                const html = await res.text();
                document.getElementById('cart-panel-content').innerHTML = html;
            }
        };

        function togglePwd(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
            else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
        }
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const redirectField = document.getElementById('loginRedirectTo');
            if (!redirectField.value) redirectField.value = window.location.href;
            const btn = document.getElementById('loginSubmitBtn');
            const txt = document.getElementById('loginBtnText');
            const spin = document.getElementById('loginBtnSpinner');
            txt.style.display = 'none';
            spin.style.display = 'inline';
            btn.disabled = true;
            try {
                const res = await fetch(this.action, { method: 'POST', body: new URLSearchParams(new FormData(this)), redirect: 'follow' });
                if (res.url && res.url.includes('loginError')) {
                    txt.style.display = 'inline'; spin.style.display = 'none'; btn.disabled = false;
                    let err = document.querySelector('#loginModal .auth-error');
                    if (!err) { err = document.createElement('div'); err.className = 'auth-error'; this.before(err); }
                    err.textContent = 'Identifiants incorrects. Réessayez.';
                } else {
                    window.location.href = res.url || '/';
                }
            } catch {
                txt.style.display = 'inline'; spin.style.display = 'none'; btn.disabled = false;
            }
        });
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('signupSubmitBtn');
            const txt = document.getElementById('signupBtnText');
            const spin = document.getElementById('signupBtnSpinner');
            txt.style.display = 'none'; spin.style.display = 'inline'; btn.disabled = true;
            try {
                const res = await fetch(this.action, { method: 'POST', body: new URLSearchParams(new FormData(this)), redirect: 'follow' });
                if (res.url && res.url.includes('signupError')) {
                    txt.style.display = 'inline'; spin.style.display = 'none'; btn.disabled = false;
                    let err = document.querySelector('#signupModal .auth-error');
                    if (!err) { err = document.createElement('div'); err.className = 'auth-error'; this.before(err); }
                    const params = new URL(res.url).searchParams;
                    err.textContent = params.get('signupError') || 'Une erreur est survenue. Réessayez.';
                } else {
                    window.location.href = res.url || '/';
                }
            } catch {
                txt.style.display = 'inline'; spin.style.display = 'none'; btn.disabled = false;
            }
        });
        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }
        function switchModal(from, to) { closeModal(from); openModal(to); }
        function closeOnAuthOverlay(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal('loginModal'); closeModal('signupModal'); } });

        // Auto-open based on URL params or server-side errors
        (function() {
            const p = new URLSearchParams(window.location.search);
            if (p.has('loginError')) openModal('loginModal');
            if (p.has('signupError')) openModal('signupModal');
        })();
        // Auto-open signup modal if server-side signupError flash present
        const hasSignupError = /*[[${signupError != null}]]*/ false;
        if (hasSignupError) openModal('signupModal');
    </script>
</div>
</body>
</html>
