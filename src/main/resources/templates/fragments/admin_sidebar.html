<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="adminSidebar(activePage)" class="sidebar">
    <div class="brand">
        <h2>Management</h2>
        <span>Admin Control</span>
    </div>

    <a th:href="@{/admin/dashboard}" class="nav-item" th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
        <i class="fas fa-th-large"></i> Dashboard
    </a>
    <a th:href="@{/admin/users}" class="nav-item" th:classappend="${activePage == 'gerants'} ? ' active' : ''">
        <i class="fas fa-users-cog"></i> Users
    </a>
    <a th:href="@{/admin/commandes}" class="nav-item" th:classappend="${activePage == 'commandes'} ? ' active' : ''">
        <i class="fas fa-shopping-cart"></i> Orders
    </a>
    <a th:href="@{/admin/avis}" class="nav-item" th:classappend="${activePage == 'avis'} ? ' active' : ''">
        <i class="fas fa-comment-alt"></i> Reviews
    </a>
    <a th:href="@{/admin/products}" class="nav-item" th:classappend="${activePage == 'products'} ? ' active' : ''">
        <i class="fas fa-box-open"></i> Product
    </a>
    <a th:href="@{/admin/categories}" class="nav-item" th:classappend="${activePage == 'categories'} ? ' active' : ''">
        <i class="fas fa-tags"></i> Category
    </a>
    <a th:href="@{/admin/promotions}" class="nav-item" th:classappend="${activePage == 'promotions'} ? ' active' : ''">
        <i class="fas fa-percent"></i> Promotions
    </a>

    <div class="bottom-nav">
        <a th:href="@{/}" class="nav-item"><i class="fas fa-store"></i> Storefront</a>
        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="nav-item" style="background: none; border: none; width: 100%; cursor: pointer;">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </button>
        </form>
    </div>
</div>
</body>
</html>
